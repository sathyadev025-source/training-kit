default_environment: dev
project_id: 019b5619-4f8a-73a2-933e-d8e0947a397e
environments:
- name: dev
  config:
    plugins:
      extractors:
      - name: tap-csv
        config:
          files:
          - path: data/sample.csv
            entity: people
            keys:
            - id
      loaders:
      - name: target-postgres
        config:
          host: localhost
          port: 5432
          user: db_user
          database: analytics
          dialect+driver: postgresql+psycopg2
- name: staging
- name: prod
plugins:
  extractors:
  - name: tap-csv
    variant: meltanolabs
    pip_url: git+https://github.com/MeltanoLabs/tap-csv.git
  loaders:
  - name: target-postgres
    variant: meltanolabs
    pip_url: meltanolabs-target-postgres
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
